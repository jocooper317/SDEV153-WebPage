<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Iron Hide Leather Works</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Iron Hide Leather Works</h1>
  <p>Contact and Custom Orders</p>
</header>

<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="product.html">Product</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<main>
  <section>
    <h2>Contact Information</h2>
    <p>Email: info@ironhideleatherworks.com</p>
    <p>Instagram: @ironhideleatherworks</p>
  </section>

  <section>
    <h2>Custom Order Request</h2>
    <form>
      <p>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name">
      </p>

      <p>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email">
      </p>

      <p>
        <label for="details">Custom Order Details:</label><br>
        <textarea id="details" name="details" rows="5" cols="30"></textarea>
      </p>

      <p>
        <input type="submit" value="Send Request">
      </p>
    </form>
  </section>
</main>

<footer>
  <p>&copy; 2026 Iron Hide Leather Works</p>
</footer>

</body>
</html>
