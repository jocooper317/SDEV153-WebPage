<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Iron Hide Leather Works</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>Iron Hide Leather Works</h1>
  <p>Contact and Custom Orders</p>
</header>

<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="product.html">Product</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="hero">
  <h2>Handcrafted Leather Goods</h2>
</div>

<main>
  <section>
    <h2>Contact Information</h2>
    <p>Email: info@ironhideleatherworks.com</p>
    <p>Instagram: @ironhideleatherworks</p>
  </section>

  <section>
    <h2>Custom Order Request</h2>

    <form method="post" action="#">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="walletstyle">Wallet Style:</label>
      <select id="walletstyle" name="walletstyle">
        <option value="minimal">Minimal Wallet</option>
        <option value="bifold">Bifold Wallet</option>
        <option value="custom">Custom Wallet</option>
      </select>

      <label for="color">Preferred Leather Color:</label>
      <input type="text" id="color" name="color" placeholder="Example: black, brown, tan">

      <label for="details">Custom Order Details:</label>
      <textarea id="details" name="details" placeholder="Describe your custom order request here."></textarea>

      <input type="submit" value="Send Request">
      <input type="reset" value="Clear Form">
    </form>
  </section>
</main>

<footer>
  <p>&copy; 2026 Iron Hide Leather Works</p>
</footer>

</body>
</html>
